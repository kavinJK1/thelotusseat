<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   CLEANER MEDITATION CUSHION + CORK BASE
   - reduced bump strength
   - calmer stitched panel texture
   - less "melted" top surface
   - darker side fabric
   - more cork-like tray
   ============================================================ */

/* ---------------- renderer / scene ---------------- */
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.90;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd7d0c4);
scene.fog = new THREE.Fog(0xd7d0c4, 180, 340);

const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 1, 1000);

scene.add(new THREE.HemisphereLight(0xf4efe7, 0x8f7968, 0.42));

const key = new THREE.DirectionalLight(0xf7eddc, 0.92);
key.position.set(-48, 64, 72);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -90;
key.shadow.camera.right = 90;
key.shadow.camera.top = 90;
key.shadow.camera.bottom = -90;
key.shadow.radius = 5;
scene.add(key);

const fill = new THREE.DirectionalLight(0xc6b4a1, 0.20);
fill.position.set(60, 24, -20);
scene.add(fill);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(300, 64),
  new THREE.MeshStandardMaterial({
    color:0xc9c0b1,
    roughness:0.78,
    metalness:0.0
  })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

/* ---------------- helpers ---------------- */
function sstep(t){
  t = Math.max(0, Math.min(1, t));
  return t*t*(3 - 2*t);
}

function insideDist(x, z, a, b, r){
  const qx = Math.abs(x) - (a - r);
  const qz = Math.abs(z) - (b - r);
  const sd = Math.min(Math.max(qx, qz), 0) + Math.hypot(Math.max(qx,0), Math.max(qz,0)) - r;
  return -sd;
}

function roundCorner(x, z, a, b, r){
  const cx = Math.max(-(a-r), Math.min(a-r, x));
  const cz = Math.max(-(b-r), Math.min(b-r, z));
  const dx = x - cx;
  const dz = z - cz;
  const d = Math.hypot(dx, dz);
  if(d > r) return [cx + dx*r/d, cz + dz*r/d];
  return [x, z];
}

function roundRectPath(ctx, x, y, w, h, r){
  const rr = Math.min(r, w*0.5, h*0.5);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
}

function makeRoundedBoxGeometry(W, D, cornerR, topFn, sideInset=0.95, res=140){
  const geo = new THREE.BoxGeometry(1,1,1,res,20,res);
  geo.clearGroups();

  const pos = geo.attributes.position;
  const uv = geo.attributes.uv;
  const nrm = geo.attributes.normal;
  const groups = {};

  for(let i=0;i<pos.count;i++){
    let X = pos.getX(i) * W;
    let Y = pos.getY(i);
    let Z = pos.getZ(i) * D;

    [X, Z] = roundCorner(X, Z, W/2, D/2, cornerR);

    const y01 = Y + 0.5;
    const isTop = nrm.getY(i) > 0.5;
    const isBottom = nrm.getY(i) < -0.5;
    const topH = topFn(X, Z);

    if(isTop){
      pos.setXYZ(i, X, y01 * topH, Z);
      uv.setXY(i, X/W + 0.5, Z/D + 0.5);
    } else if(isBottom){
      pos.setXYZ(i, X, 0, Z);
      uv.setXY(i, X/W + 0.5, Z/D + 0.5);
    } else {
      let yy = y01 * (topH - sideInset);
      yy -= 0.10 * Math.exp(-Math.pow((y01 - 0.03) / 0.05, 2));
      pos.setXYZ(i, X, yy, Z);
      uv.setXY(i, (Math.atan2(Z, X)/(Math.PI*2)) + 0.5, y01);
    }
  }

  const index = geo.index.array;
  for(let i=0;i<index.length;i+=3){
    const a = index[i], b = index[i+1], c = index[i+2];
    const ny = (nrm.getY(a)+nrm.getY(b)+nrm.getY(c))/3;
    const mat = ny > 0.5 ? 0 : (ny < -0.5 ? 2 : 1);
    if(!groups[mat]) groups[mat] = [];
    groups[mat].push(i);
  }

  Object.keys(groups).sort((a,b)=>a-b).forEach(mat=>{
    const arr = groups[mat];
    let start = arr[0];
    let count = 3;
    for(let i=1;i<arr.length;i++){
      if(arr[i] === arr[i-1] + 3) count += 3;
      else{
        geo.addGroup(start, count, Number(mat));
        start = arr[i];
        count = 3;
      }
    }
    geo.addGroup(start, count, Number(mat));
  });

  geo.computeVertexNormals();
  return geo;
}

/* ---------------- dimensions ---------------- */
const CW = 42, CD = 42, C_R = 3.3;
const BW = 46, BD = 44, B_H = 4.8, B_R = 1.2;

/* ---------------- cushion form ---------------- */
function cushionTop(x, z){
  const nz = (z + CD * 0.5) / CD;
  const nx = x / (CW * 0.5);

  let h =
    6.0 +
    0.22 * (1.0 - nx * nx) +
    4.2 * sstep((nz - 0.52) / 0.24) +
    1.2 * sstep((nz - 0.76) / 0.16);

  const seamNz = 0.535 - 0.014 * (1.0 - nx * nx);
  h -= 0.32 * Math.exp(-Math.pow((nz - seamNz) / 0.028, 2));

  const insertX = x / 4.9;
  const insertZ = (z - 2.7) / 8.0;
  const insertE = Math.sqrt(insertX*insertX + insertZ*insertZ);
  h += 0.34 * sstep((1.0 - insertE) / 0.24);
  h -= 0.24 * Math.exp(-Math.pow((insertE - 1.02) / 0.08, 2));

  const leftArc = Math.sqrt(Math.pow((x + 10.0) / 8.8, 2) + Math.pow((z - 3.4) / 17.5, 2));
  const rightArc = Math.sqrt(Math.pow((x - 10.0) / 8.8, 2) + Math.pow((z - 3.4) / 17.5, 2));
  h -= 0.18 * Math.exp(-Math.pow((leftArc - 1.0) / 0.06, 2));
  h -= 0.18 * Math.exp(-Math.pow((rightArc - 1.0) / 0.06, 2));

  const domeX = x / 15.5;
  const domeZ = (z - 13.5) / 8.6;
  const domeE = Math.sqrt(domeX*domeX + domeZ*domeZ);
  h += 0.28 * sstep((1.0 - domeE) / 0.30);

  const sweepL = Math.sqrt(Math.pow((x + 15.2) / 11.2, 2) + Math.pow((z + 1.8) / 14.0, 2));
  const sweepR = Math.sqrt(Math.pow((x - 15.2) / 11.2, 2) + Math.pow((z + 1.8) / 14.0, 2));
  h -= 0.12 * Math.exp(-Math.pow((sweepL - 1.0) / 0.05, 2));
  h -= 0.12 * Math.exp(-Math.pow((sweepR - 1.0) / 0.05, 2));

  const d = insideDist(x, z, CW/2, CD/2, C_R);
  const edgeBand = Math.max(0, Math.min(1, d / 1.5));
  h -= 0.18 * (1.0 - edgeBand);

  return Math.max(2.2, h);
}

/* ---------------- fabric helpers ---------------- */
function fabricNoise(g, x, y, w, h, base, warp, weft, density=22000){
  g.fillStyle = base;
  g.fillRect(x, y, w, h);

  for(let i=0;i<density;i++){
    const px = x + Math.random()*w;
    const py = y + Math.random()*h;
    g.fillStyle = Math.random() < 0.5 ? warp : weft;
    g.globalAlpha = 0.035 + Math.random()*0.05;
    g.fillRect(px, py, 1.2 + Math.random()*1.0, 0.8 + Math.random()*0.9);
  }
  g.globalAlpha = 1;
}

function drawStitchLine(g, drawPath, thread='#ad8468', shadow='rgba(70,45,30,0.12)', hi='rgba(255,245,235,0.14)'){
  g.save();
  g.lineCap = 'round';
  g.lineJoin = 'round';

  g.strokeStyle = shadow;
  g.lineWidth = 2.5;
  drawPath();
  g.stroke();
  g.restore();

  g.save();
  g.strokeStyle = hi;
  g.lineWidth = 0.8;
  drawPath();
  g.stroke();
  g.restore();

  g.save();
  g.setLineDash([2.2, 3.0]);
  g.strokeStyle = thread;
  g.lineWidth = 1.1;
  g.lineCap = 'round';
  g.lineJoin = 'round';
  drawPath();
  g.stroke();
  g.restore();
}

/* ---------------- top texture ---------------- */
function cushionTexture(){
  const S = 2048;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const g = c.getContext('2d');

  const TOP = '#dfd2ca';
  const TOP_WARP = 'rgba(255,248,244,0.10)';
  const TOP_WEFT = 'rgba(138,112,98,0.08)';

  const YOKE = '#b1775f';
  const YOKE_WARP = 'rgba(237,210,194,0.08)';
  const YOKE_WEFT = 'rgba(116,76,58,0.08)';

  const LOTUS = '#e9dfd7';

  fabricNoise(g, 0, 0, S, S, TOP, TOP_WARP, TOP_WEFT, 18000);

  g.save();
  g.beginPath();
  g.moveTo(0, S*0.56);
  g.quadraticCurveTo(S*0.18, S*0.49, S*0.29, S*0.49);
  g.quadraticCurveTo(S*0.41, S*0.495, S*0.50, S*0.555);
  g.quadraticCurveTo(S*0.59, S*0.495, S*0.71, S*0.49);
  g.quadraticCurveTo(S*0.82, S*0.49, S, S*0.56);
  g.lineTo(S, S);
  g.lineTo(0, S);
  g.closePath();
  g.clip();
  fabricNoise(g, 0, 0, S, S, YOKE, YOKE_WARP, YOKE_WEFT, 12000);
  g.restore();

  g.save();
  g.beginPath();
  g.moveTo(S*0.18, S);
  g.quadraticCurveTo(S*0.19, S*0.66, S*0.50, S*0.64);
  g.quadraticCurveTo(S*0.81, S*0.66, S*0.82, S);
  g.closePath();
  g.clip();
  fabricNoise(g, 0, 0, S, S, LOTUS, 'rgba(255,255,255,0.08)', 'rgba(140,115,98,0.06)', 10000);
  g.restore();

  drawStitchLine(g, ()=>{
    g.beginPath();
    g.moveTo(0, S*0.56);
    g.quadraticCurveTo(S*0.18, S*0.49, S*0.29, S*0.49);
    g.quadraticCurveTo(S*0.41, S*0.495, S*0.50, S*0.555);
    g.quadraticCurveTo(S*0.59, S*0.495, S*0.71, S*0.49);
    g.quadraticCurveTo(S*0.82, S*0.49, S, S*0.56);
  }, '#9c755f');

  drawStitchLine(g, ()=>{
    g.beginPath();
    g.moveTo(S*0.18, S);
    g.quadraticCurveTo(S*0.19, S*0.66, S*0.50, S*0.64);
    g.quadraticCurveTo(S*0.81, S*0.66, S*0.82, S);
  }, '#a28068');

  drawStitchLine(g, ()=>{
    g.beginPath();
    g.moveTo(S*0.18, S*0.06);
    g.quadraticCurveTo(S*0.16, S*0.36, S*0.31, S*0.53);
  }, '#a58b78');

  drawStitchLine(g, ()=>{
    g.beginPath();
    g.moveTo(S*0.82, S*0.06);
    g.quadraticCurveTo(S*0.84, S*0.36, S*0.69, S*0.53);
  }, '#a58b78');

  drawStitchLine(g, ()=>{
    roundRectPath(g, S*0.405, S*0.16, S*0.19, S*0.28, S*0.085);
  }, '#a48b78');

  g.save();
  for(let i=-3;i<=3;i++){
    const x = S*0.50 + i*S*0.016;
    const y0 = S*0.45;
    const y1 = S*0.56 + Math.abs(i)*S*0.004;
    g.strokeStyle = 'rgba(120,94,80,0.08)';
    g.lineWidth = 1.2;
    g.beginPath();
    g.moveTo(x, y0);
    g.quadraticCurveTo(x + i*2.2, (y0+y1)/2, x + i*1.2, y1);
    g.stroke();
  }
  g.restore();

  g.save();
  g.translate(S*0.50, S*0.83);
  g.scale(1.46, 1.46);
  g.strokeStyle = '#d8ab69';
  g.lineWidth = 1.6;
  g.lineCap = 'round';
  g.lineJoin = 'round';

  function petal(rot, len, wid){
    g.save();
    g.rotate(rot);
    g.beginPath();
    g.moveTo(0,0);
    g.quadraticCurveTo(wid,-len*0.52,0,-len);
    g.quadraticCurveTo(-wid,-len*0.52,0,0);
    g.stroke();
    g.restore();
  }

  petal(0,54,11);
  petal(-0.42,46,10);
  petal(0.42,46,10);
  petal(-0.82,37,9);
  petal(0.82,37,9);
  petal(-1.20,27,8);
  petal(1.20,27,8);

  g.beginPath();
  g.moveTo(0,-6);
  g.quadraticCurveTo(7,5,0,17);
  g.quadraticCurveTo(-7,5,0,-6);
  g.stroke();

  g.restore();

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  return tex;
}

/* ---------------- bump texture ---------------- */
function cushionBump(){
  const S = 2048;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const g = c.getContext('2d');

  g.fillStyle = '#808080';
  g.fillRect(0, 0, S, S);

  function dent(draw, width=5, tone='#666'){
    g.save();
    g.strokeStyle = tone;
    g.lineWidth = width;
    g.lineCap = 'round';
    g.lineJoin = 'round';
    draw();
    g.stroke();
    g.restore();
  }

  dent(()=>{
    g.beginPath();
    g.moveTo(0, S*0.56);
    g.quadraticCurveTo(S*0.18, S*0.49, S*0.29, S*0.49);
    g.quadraticCurveTo(S*0.41, S*0.495, S*0.50, S*0.555);
    g.quadraticCurveTo(S*0.59, S*0.495, S*0.71, S*0.49);
    g.quadraticCurveTo(S*0.82, S*0.49, S, S*0.56);
  }, 6, '#6b6b6b');

  dent(()=>{
    g.beginPath();
    g.moveTo(S*0.18, S*0.06);
    g.quadraticCurveTo(S*0.16, S*0.36, S*0.31, S*0.53);
  }, 4, '#707070');

  dent(()=>{
    g.beginPath();
    g.moveTo(S*0.82, S*0.06);
    g.quadraticCurveTo(S*0.84, S*0.36, S*0.69, S*0.53);
  }, 4, '#707070');

  dent(()=>{
    roundRectPath(g, S*0.405, S*0.16, S*0.19, S*0.28, S*0.085);
  }, 5, '#6f6f6f');

  dent(()=>{
    g.beginPath();
    g.moveTo(S*0.18, S);
    g.quadraticCurveTo(S*0.19, S*0.66, S*0.50, S*0.64);
    g.quadraticCurveTo(S*0.81, S*0.66, S*0.82, S);
  }, 4, '#747474');

  return new THREE.CanvasTexture(c);
}

/* ---------------- side fabric ---------------- */
function sideFabricTexture(){
  const S = 1024;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const g = c.getContext('2d');

  fabricNoise(g, 0, 0, S, S, '#c7ac9d', 'rgba(248,233,224,0.18)', 'rgba(130,97,82,0.16)', 18000);

  for(let y=0; y<S; y+=7){
    g.strokeStyle = 'rgba(255,255,255,0.020)';
    g.beginPath();
    g.moveTo(0, y + 0.5);
    g.lineTo(S, y + 0.5);
    g.stroke();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  return tex;
}

/* ---------------- cushion mesh ---------------- */
function buildCushionGroup(){
  const topMat = new THREE.MeshStandardMaterial({
    map: cushionTexture(),
    bumpMap: cushionBump(),
    bumpScale: 0.08,
    roughness: 0.96,
    metalness: 0
  });

  const sideMat = new THREE.MeshStandardMaterial({
    map: sideFabricTexture(),
    roughness: 0.98,
    metalness: 0,
    color: new THREE.Color('#c8ab9b')
  });

  const bottomMat = new THREE.MeshStandardMaterial({
    color:'#bea08e',
    roughness:0.99
  });

  const bodyGeo = makeRoundedBoxGeometry(CW, CD, C_R, cushionTop, 0.95, 150);
  const body = new THREE.Mesh(bodyGeo, [topMat, sideMat, bottomMat]);
  body.castShadow = true;
  body.receiveShadow = true;

  const pipeMat = new THREE.MeshStandardMaterial({
    color:'#eee4dc',
    roughness:0.86
  });

  const pts = [];
  const a = CW/2 - 0.14;
  const b = CD/2 - 0.14;
  for(let i=0;i<=260;i++){
    const th = i/260 * Math.PI * 2;
    let x = Math.cos(th) * a;
    let z = Math.sin(th) * b;
    [x, z] = roundCorner(x, z, a, b, C_R);
    pts.push(new THREE.Vector3(x, cushionTop(x, z) - 0.02, z));
  }

  const piping = new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts, true), 260, 0.18, 10, true),
    pipeMat
  );
  piping.castShadow = true;

  const grp = new THREE.Group();
  grp.add(body, piping);
  return grp;
}

/* ---------------- cork base ---------------- */
function corkTop(x, z){
  let h = B_H;
  const a = BW/2 - 2.0;
  const b = BD/2 - 2.0;
  const r = 1.4;
  const d = insideDist(x, z, a, b, r);
  h -= 1.0 * sstep((d + 0.15) / 0.9);

  const de = insideDist(x, z, BW/2, BD/2, B_R);
  h -= 0.16 * Math.exp(-Math.max(0, de) * 2.8);

  return h;
}

function corkTexture(){
  const S=1024, c=document.createElement('canvas');
  c.width=c.height=S;
  const g=c.getContext('2d');

  g.fillStyle='#b67d49';
  g.fillRect(0,0,S,S);

  const shades=['#d39c63','#c48a54','#aa6d3c','#8f572f','#e0b07a','#754827'];
  for(let i=0;i<90000;i++){
    g.fillStyle=shades[(Math.random()*shades.length)|0];
    g.globalAlpha=0.16+Math.random()*0.24;
    const w=0.7+Math.random()*1.8;
    const h=0.7+Math.random()*1.8;
    g.fillRect(Math.random()*S, Math.random()*S, w, h);
  }
  g.globalAlpha=1;

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  return tex;
}

function buildCorkBaseGroup(){
  const geo = makeRoundedBoxGeometry(BW, BD, B_R, corkTop, 0.15, 110);

  const topMat = new THREE.MeshStandardMaterial({
    map:corkTexture(),
    roughness:0.97,
    metalness:0
  });

  const sideMat = new THREE.MeshStandardMaterial({
    map:corkTexture(),
    roughness:0.98,
    metalness:0
  });

  const bottomMat = new THREE.MeshStandardMaterial({
    color:'#8f5d34',
    roughness:0.99
  });

  const mesh = new THREE.Mesh(geo, [topMat, sideMat, bottomMat]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const grp = new THREE.Group();
  grp.add(mesh);
  return grp;
}

/* ---------------- assemble ---------------- */
const cushionGroup = buildCushionGroup();
const baseGroup = buildCorkBaseGroup();
scene.add(cushionGroup, baseGroup);

const SEP = {
  cushion: new THREE.Vector3(-30, 0, 0),
  base: new THREE.Vector3(30, 0, 0)
};

const STK = {
  cushion: new THREE.Vector3(0, B_H - 0.92, 0),
  base: new THREE.Vector3(0, 0, 0)
};

let mode = 'sep';
cushionGroup.position.copy(SEP.cushion);
baseGroup.position.copy(SEP.base);

/* ---------------- ui ---------------- */
const btnSep = document.getElementById('btnSep');
const btnStack = document.getElementById('btnStack');
const spin = document.getElementById('spin');

btnSep.onclick = ()=>{
  mode = 'sep';
  btnSep.classList.add('active');
  btnStack.classList.remove('active');
};

btnStack.onclick = ()=>{
  mode = 'stk';
  btnStack.classList.add('active');
  btnSep.classList.remove('active');
};

/* ---------------- orbit controls ---------------- */
let theta = 0.62;
let phi = 1.08;
let radius = 118;
let dragging = false;
let px = 0, py = 0;
const target = new THREE.Vector3(0, 8, 0);

renderer.domElement.addEventListener('pointerdown', e=>{
  dragging = true;
  px = e.clientX;
  py = e.clientY;
});

addEventListener('pointerup', ()=> dragging = false);

addEventListener('pointermove', e=>{
  if(!dragging) return;
  theta -= (e.clientX - px) * 0.006;
  phi -= (e.clientY - py) * 0.006;
  phi = Math.max(0.24, Math.min(1.48, phi));
  px = e.clientX;
  py = e.clientY;
});

addEventListener('wheel', e=>{
  radius = Math.max(45, Math.min(260, radius + e.deltaY * 0.08));
}, { passive:true });

/* ---------------- animate ---------------- */
function animate(){
  requestAnimationFrame(animate);

  if(spin.checked && !dragging) theta += 0.0020;

  const tgt = mode === 'sep' ? SEP : STK;
  cushionGroup.position.lerp(tgt.cushion, 0.06);
  baseGroup.position.lerp(tgt.base, 0.06);

  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.sin(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(target);

  renderer.render(scene, camera);
}
animate();

/* ---------------- resize ---------------- */
addEventListener('resize', ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
