        - paragraph [ref=f7e130]: "Color negative film is composed of a complex series of layered materials, each meticulously engineered to respond to specific wavelengths of light. At the core is a transparent film base, typically made of triacetate or polyester, which provides structural support. Above this lies a subbing layer that facilitates adhesion between the base and the emulsion. The emulsion itself is divided into three primary light-sensitive layers, each responsive to a distinct portion of the visible spectrum: blue, green, and red light. These layers are separated by dye filters—such as yellow and UV-absorbing layers—to control unwanted light contamination and improve spectral precision. Additional layers, including anti-halation coatings and protective top coats, reduce glare and shield the film from mechanical damage. Together, these layers form a sophisticated photochemical system that captures color information with remarkable accuracy and depth, enabling the analog reproduction of real-world scenes onto a physical medium."
