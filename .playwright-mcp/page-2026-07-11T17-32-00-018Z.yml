        - paragraph [ref=f7e93]: Introduced in the 1930s for still photography, 35mm film became the gold standard due to its balance of portability, image quality, and affordability. Each roll of 35mm film typically contains 24 or 36 exposures, with each frame measuring 24x36mm. This aspect ratio (3:2) became the default for most consumer cameras and heavily influenced digital sensor formats. The film features perforations along both edges for transport mechanisms and is housed in a light-tight metal canister. Upon exposure, the film must be developed chemically, using C-41 (for color negatives), E-6 (for color slide film), or black-and-white developers such as D-76 or Rodinal.
        - generic [ref=f7e95]:
