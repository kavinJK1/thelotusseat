            - text: "01"
            - heading "Ergonomic Tilted Base" [level=3] [ref=e23]
            - paragraph [ref=e24]: An 8° inclined cork composite base gently tilts the pelvis into its natural forward position. This pelvic tilt is the foundation of effortless upright posture — it propagates through the entire spine without any muscular effort required.
            - list [ref=e25]:
              - listitem [ref=e26]: Natural cork composite
              - listitem [ref=e28]: 8° ergonomic tilt
              - listitem [ref=e30]: Anti-slip base finish
          - generic [ref=e33]:
            - text: "02"
            - heading "Responsive Latex Cushion (Base)" [level=3] [ref=e34]
            - paragraph [ref=e35]: A 70 mm flat natural latex base layer provides the structural foundation. At ILD 75–85 (soft firmness), it offers meaningful support without excessive give — the seat holds its position rather than collapsing under weight.
            - list [ref=e36]:
              - listitem [ref=e37]: Natural latex
              - listitem [ref=e39]: ILD 75–85 (soft firmness)
              - listitem [ref=e41]: 70 mm thick
              - listitem [ref=e43]: Flat profile, no cut-outs
          - generic [ref=e46]:
            - text: "03"
            - heading "Ramped Comfort Layer" [level=3] [ref=e47]
            - paragraph [ref=e48]: The top latex layer is thicker at the rear (50 mm) and tapers toward the front (32 mm). This graduated thickness works in concert with the base tilt to support the sacrum and lower back while the hips settle naturally.
            - list [ref=e49]:
              - listitem [ref=e50]: Natural latex
              - listitem [ref=e52]: ILD 45–55 (soft)
              - listitem [ref=e54]: 50 mm rear / 32 mm front
              - listitem [ref=e56]: Graduated ramp profile
          - generic [ref=e59]:
            - text: "04"
            - heading "Central Relief Channel" [level=3] [ref=e60]
            - paragraph [ref=e61]: A shallow central channel (10–15 mm depth) is sculpted into the cushion surface to lift the coccyx away from contact with the seat. Tailbone pressure is one of the leading causes of short meditation sessions.
            - list [ref=e62]:
              - listitem [ref=e63]: 10–15 mm depth
              - listitem [ref=e65]: Precisely sculpted channel
              - listitem [ref=e67]: Maintains cushion firmness
              - listitem [ref=e69]: Coccyx off-loading design
          - generic [ref=e72]:
            - text: "05"
            - heading "Breathable Cover" [level=3] [ref=e73]
            - paragraph [ref=e74]: An upholstery-grade woven cotton-poly and linen blend in warm ivory cream. The 300–350 GSM weight provides durability without rigidity. A tone-on-tone lotus motif is embroidered on the rear panel — the only decorative element on an otherwise minimal form.
            - list [ref=e75]:
              - listitem [ref=e76]: Cotton-poly / linen blend
              - listitem [ref=e78]: 300–350 GSM
              - listitem [ref=e80]: Warm ivory / natural cream
              - listitem [ref=e82]: Tone-on-tone lotus embroidery
          - generic [ref=e85]:
            - text: "06"
            - heading "Stable Cork Base" [level=3] [ref=e86]
            - paragraph [ref=e87]: The 500 × 440 mm cork base provides a generous, stable foundation that minimises micro-adjustments during sitting. Cork is naturally antimicrobial, lightweight, and provides excellent grip on most floor surfaces.
