    - generic [ref=f2e318]:
      - generic [ref=f2e320]:
        - paragraph [ref=f2e321]: FAQ
        - heading "Common questions." [level=2] [ref=f2e322]
      - generic [ref=f2e324]:
        - generic [ref=f2e325]:
          - button "Why this seat over a regular meditation cushion?" [ref=f2e326]
          - paragraph [ref=f2e331]: A regular cushion offers padding but does nothing for your posture. The Lotus Seat actively positions your pelvis — through its 8° tilt and ramped latex layers — so your spine aligns naturally without effort. That structural difference is what allows longer, more comfortable sits.
        - generic [ref=f2e332]:
          - button "Why natural latex instead of memory foam?" [ref=f2e333]
          - paragraph [ref=f2e338]: Memory foam is compressive — it lets you sink in, which destabilises posture and retains heat. Natural latex is responsive — it pushes back evenly, supports your weight without deforming, and breathes much better. For meditation, where you want consistent support for long periods, latex is significantly superior.
        - generic [ref=f2e339]:
          - button "Which postures and meditation styles does it support?" [ref=f2e340]
          - paragraph [ref=f2e345]: "The Lotus Seat is designed for all seated cross-legged postures: Siddhasana, Sukhasana (easy pose), Burmese position, Half Lotus, and variations. It works equally well for mindfulness meditation, breathwork, and Vipassana-style practices."
        - generic [ref=f2e346]:
          - button "Is it suitable for beginners?" [ref=f2e347]
          - paragraph [ref=f2e352]: Yes — especially so. Beginners often abandon their practice because of physical discomfort. The ergonomic support makes sitting immediately more accessible, allowing you to build a consistent habit before your body has fully adapted to the posture.
        - generic [ref=f2e353]:
          - button "How do I care for and clean the seat?" [ref=f2e354]
          - paragraph [ref=f2e359]: The cover is removable and machine-washable on a gentle cycle in cool water. Lay flat to dry. The cork base and latex cushion should be spot-cleaned only — avoid soaking. Keep out of direct, prolonged sunlight to preserve the natural materials.
        - generic [ref=f2e360]:
          - button "How long can I comfortably sit on it?" [ref=f2e361]
          - paragraph [ref=f2e366]: This depends on your current practice level, but the Lotus Seat is specifically designed to extend comfortable sitting beyond what most cushions allow. Many practitioners report sitting 30–60 minutes comfortably from early use, with the ergonomic support making a noticeable difference immediately.
        - generic [ref=f2e367]:
          - button "When will orders ship?" [ref=f2e368]
          - paragraph [ref=f2e373]: The Lotus Seat is currently available for pre-order. We will confirm shipping timelines with each pre-order customer via email. Sign up to receive updates on production and shipping schedules.
        - generic [ref=f2e374]:
          - button "What is the warranty?" [ref=f2e375]
          - paragraph [ref=f2e380]: The Lotus Seat comes with a 2-year warranty covering defects in materials and workmanship. Natural materials age gracefully and with proper care the seat should last many years.
        - generic [ref=f2e381]:
          - button "What is the returns policy?" [ref=f2e382]
          - paragraph [ref=f2e387]: We offer a 30-day satisfaction guarantee. If the seat does not improve your practice after 30 days of use, contact us for a full refund. See our Shipping & Returns page for full details.
