    - generic [ref=f3e102]:
      - generic [ref=f3e103]:
        - paragraph [ref=f3e104]: 01 — The problem
        - generic [ref=f3e105]:
          - heading "It’s almost never your mind that ends a sit early." [level=2] [ref=f3e106]
          - paragraph [ref=f3e107]: It’s your body. And a softer cushion doesn’t fix any of it — because the real problem isn’t padding, it’s posture.
      - generic [ref=f3e108]:
        - generic [ref=f3e110]:
          - text: "01"
          - heading "Your back slumps" [level=3] [ref=f3e111]
          - paragraph [ref=f3e112]: A flat cushion lets your hips roll backward. Your spine curves, your shoulders round, and holding yourself up becomes work.
        - generic [ref=f3e114]:
          - text: "02"
          - heading "Your tailbone aches" [level=3] [ref=f3e115]
          - paragraph [ref=f3e116]: All your weight presses onto one small spot. After a while, it’s the only thing you can feel.
        - generic [ref=f3e118]:
          - text: "03"
          - heading "Your legs go numb" [level=3] [ref=f3e119]
          - paragraph [ref=f3e120]: Poor support squeezes the blood flow in your legs, and your feet start to fall asleep within minutes.
        - generic [ref=f3e122]:
          - text: "04"
          - heading "You keep shifting" [level=3] [ref=f3e123]
          - paragraph [ref=f3e124]: So you fidget and re-adjust to find a bearable position — and every time, your focus goes with it.
    - generic [ref=f3e127]:
      - generic [ref=f3e128]:
        - paragraph [ref=f3e129]: 02 — The solution
        - heading "A seat that puts you in the right posture — for you." [level=2] [ref=f3e130]
        - paragraph [ref=f3e131]: You shouldn’t have to concentrate on sitting up straight. The Lotus Seat does the work, so all that’s left is the practice.
        - list [ref=f3e132]:
          - listitem [ref=f3e133]:
            - generic [ref=f3e134]: "01"
            - generic [ref=f3e135]:
              - heading "It tips you forward" [level=3] [ref=f3e136]
              - paragraph [ref=f3e137]: The whole seat leans forward by 8°. That small angle rolls your hips into the right spot, so your back stacks up straight — you don’t have to hold it there.
          - listitem [ref=f3e138]:
            - generic [ref=f3e139]: "02"
            - generic [ref=f3e140]:
              - heading "It holds you up" [level=3] [ref=f3e141]
              - paragraph [ref=f3e142]: Firm, springy latex supports your weight without letting you sink. You stay upright the whole sit, not just the first few minutes.
          - listitem [ref=f3e143]:
            - generic [ref=f3e144]: "03"
            - generic [ref=f3e145]:
              - heading "It takes the pressure off" [level=3] [ref=f3e146]
              - paragraph [ref=f3e147]: A soft dip down the middle keeps your tailbone from pressing into the seat — the one spot that usually starts to ache first.
      - figure [ref=f3e149]:
        - img "Side view of the Lotus Seat, rising from a thin front edge up to a higher back over its cork base" [ref=f3e151]
