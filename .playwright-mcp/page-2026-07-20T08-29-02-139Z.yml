            - generic [ref=e95]:
              - heading "It tips you forward" [level=3] [ref=e96]
              - paragraph [ref=e97]: The whole seat leans forward by 8°. That small angle rolls your hips into the right spot, so your back stacks up straight — you don’t have to hold it there.
          - listitem [ref=e98]:
            - generic [ref=e99]: "02"
            - generic [ref=e100]:
              - heading "It holds you up" [level=3] [ref=e101]
              - paragraph [ref=e102]: Firm, springy latex supports your weight without letting you sink. You stay upright the whole sit, not just the first few minutes.
          - listitem [ref=e103]:
