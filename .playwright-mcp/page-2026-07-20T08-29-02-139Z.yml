        - paragraph [ref=e64]: 01 — The problem
        - generic [ref=e65]:
          - heading "It’s almost never your mind that ends a sit early." [level=2] [ref=e66]
          - paragraph [ref=e67]: It’s your body. And a softer cushion doesn’t fix any of it — because the real problem isn’t padding, it’s posture.
      - generic [ref=e68]:
        - generic [ref=e70]:
          - text: "01"
          - heading "Your back slumps" [level=3] [ref=e71]
          - paragraph [ref=e72]: A flat cushion lets your hips roll backward. Your spine curves, your shoulders round, and holding yourself up becomes work.
        - generic [ref=e74]:
          - text: "02"
          - heading "Your tailbone aches" [level=3] [ref=e75]
          - paragraph [ref=e76]: All your weight presses onto one small spot. After a while, it’s the only thing you can feel.
        - generic [ref=e78]:
          - text: "03"
          - heading "Your legs go numb" [level=3] [ref=e79]
          - paragraph [ref=e80]: Poor support squeezes the blood flow in your legs, and your feet start to fall asleep within minutes.
        - generic [ref=e82]:
          - text: "04"
          - heading "You keep shifting" [level=3] [ref=e83]
          - paragraph [ref=e84]: So you fidget and re-adjust to find a bearable position — and every time, your focus goes with it.
    - generic [ref=e87]:
      - generic [ref=e88]:
        - paragraph [ref=e89]: 02 — The solution
        - heading "A seat that puts you in the right posture — for you." [level=2] [ref=e90]
        - paragraph [ref=e91]: You shouldn’t have to concentrate on sitting up straight. The Lotus Seat does the work, so all that’s left is the practice.
