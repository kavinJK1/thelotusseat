              - text: Lunar’s Venetian inventor. In his city, millions of tourists amble about the streets with rolling suitcases whose plastic wheels make unbearably loud noises. After one year of research, Adriano designed a wheel that cancels all noise. His lab is in via Einstein. And how could it be otherwise?
            - paragraph [ref=e90]:
