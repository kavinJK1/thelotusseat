    - generic [ref=e284]:
      - generic [ref=e286]:
        - paragraph [ref=e287]: FAQ
        - heading "Common questions." [level=2] [ref=e288]
      - generic [ref=e290]:
        - generic [ref=e291]:
          - button "Why this seat over a regular meditation cushion?" [ref=e292]:
            - generic [ref=e293]: Why this seat over a regular meditation cushion?
            - img [ref=e295]
          - paragraph [ref=e297]: A regular cushion offers padding but does nothing for your posture. The Lotus Seat actively positions your pelvis — through its 8° tilt and ramped latex layers — so your spine aligns naturally without effort. That structural difference is what allows longer, more comfortable sits.
        - generic [ref=e298]:
          - button "Why natural latex instead of memory foam?" [ref=e299]:
            - generic [ref=e300]: Why natural latex instead of memory foam?
            - img [ref=e302]
          - paragraph [ref=e304]: Memory foam is compressive — it lets you sink in, which destabilises posture and retains heat. Natural latex is responsive — it pushes back evenly, supports your weight without deforming, and breathes much better. For meditation, where you want consistent support for long periods, latex is significantly superior.
        - generic [ref=e305]:
          - button "Which postures and meditation styles does it support?" [ref=e306]:
            - generic [ref=e307]: Which postures and meditation styles does it support?
            - img [ref=e309]
          - paragraph [ref=e311]: "The Lotus Seat is designed for all seated cross-legged postures: Siddhasana, Sukhasana (easy pose), Burmese position, Half Lotus, and variations. It works equally well for mindfulness meditation, breathwork, and Vipassana-style practices."
        - generic [ref=e312]:
          - button "Is it suitable for beginners?" [ref=e313]:
            - generic [ref=e314]: Is it suitable for beginners?
            - img [ref=e316]
          - paragraph [ref=e318]: Yes — especially so. Beginners often abandon their practice because of physical discomfort. The ergonomic support makes sitting immediately more accessible, allowing you to build a consistent habit before your body has fully adapted to the posture.
        - generic [ref=e319]:
          - button "How do I care for and clean the seat?" [ref=e320]:
            - generic [ref=e321]: How do I care for and clean the seat?
            - img [ref=e323]
          - paragraph [ref=e325]: The cover is removable and machine-washable on a gentle cycle in cool water. Lay flat to dry. The cork base and latex cushion should be spot-cleaned only — avoid soaking. Keep out of direct, prolonged sunlight to preserve the natural materials.
        - generic [ref=e326]:
          - button "How long can I comfortably sit on it?" [ref=e327]:
            - generic [ref=e328]: How long can I comfortably sit on it?
            - img [ref=e330]
          - paragraph [ref=e332]: This depends on your current practice level, but the Lotus Seat is specifically designed to extend comfortable sitting beyond what most cushions allow. Many practitioners report sitting 30–60 minutes comfortably from early use, with the ergonomic support making a noticeable difference immediately.
        - generic [ref=e333]:
          - button "When will orders ship?" [ref=e334]:
            - generic [ref=e335]: When will orders ship?
            - img [ref=e337]
          - paragraph [ref=e339]: The Lotus Seat is currently available for pre-order. We will confirm shipping timelines with each pre-order customer via email. Sign up to receive updates on production and shipping schedules.
        - generic [ref=e340]:
          - button "What is the warranty?" [ref=e341]:
            - generic [ref=e342]: What is the warranty?
            - img [ref=e344]
          - paragraph [ref=e346]: The Lotus Seat comes with a 2-year warranty covering defects in materials and workmanship. Natural materials age gracefully and with proper care the seat should last many years.
        - generic [ref=e347]:
          - button "What is the returns policy?" [ref=e348]:
            - generic [ref=e349]: What is the returns policy?
            - img [ref=e351]
          - paragraph [ref=e353]: We offer a 30-day satisfaction guarantee. If the seat does not improve your practice after 30 days of use, contact us for a full refund. See our Shipping & Returns page for full details.
