    - generic [ref=e278]:
      - paragraph [ref=e279]: The Practice
      - heading "When sitting is effortless, meditation becomes possible." [level=2] [ref=e280]
      - paragraph [ref=e281]: The Lotus Seat is designed for anyone who takes their practice seriously — from first-time meditators to experienced practitioners. Every component exists to remove one more obstacle between you and the stillness you're seeking.
