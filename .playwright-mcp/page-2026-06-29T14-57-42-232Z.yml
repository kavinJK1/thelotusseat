    - generic [ref=e178]:
      - generic [ref=e180]:
        - paragraph [ref=e181]: Product Features
        - heading "Six features. One system." [level=2] [ref=e182]
      - generic [ref=e183]:
        - generic [ref=e188]:
          - text: "01"
          - heading "Ergonomic Tilted Base" [level=3] [ref=e189]
          - paragraph [ref=e190]: An 8° inclined cork composite base gently tilts the pelvis into a natural forward position. This single change propagates upward through the entire spine, reducing muscular effort and encouraging an effortlessly upright posture.
          - paragraph [ref=e191]: Natural cork composite · 8° tilt · Anti-slip base
        - generic [ref=e196]:
          - text: "02"
          - heading "Responsive Latex Cushion" [level=3] [ref=e197]
          - paragraph [ref=e198]: High-resilience natural latex — not memory foam — returns to shape quickly and provides consistent support. Unlike memory foam which allows excessive sinking and heat retention, latex maintains your posture and stays breathable throughout long sessions.
          - paragraph [ref=e199]: Natural latex · High-resilience · ILD 75–85
        - generic [ref=e204]:
          - text: "03"
          - heading "Central Relief Channel" [level=3] [ref=e205]
          - paragraph [ref=e206]: A shallow sculpted channel (10–15 mm) runs along the centre of the cushion, lifting the coccyx away from surface contact. Tailbone pressure is one of the most common reasons practitioners cut sessions short.
          - paragraph [ref=e207]: 10–15 mm depth · Precisely sculpted · Maintains firmness
        - generic [ref=e212]:
          - text: "04"
          - heading "Ramped Comfort Layer" [level=3] [ref=e213]
          - paragraph [ref=e214]: The top layer is thicker at the rear (50 mm) and tapers to the front (32 mm). This ramp supports the sacrum and lower back while allowing the front of the pelvis to settle — working in harmony with the base tilt.
          - paragraph [ref=e215]: 50 mm rear · 32 mm front · Natural latex ILD 45–55
        - generic [ref=e220]:
          - text: "05"
          - heading "Breathable Construction" [level=3] [ref=e221]
          - paragraph [ref=e222]: An upholstery-grade woven cotton-poly and linen blend cover in warm ivory cream keeps air flowing around natural materials. A tone-on-tone lotus embroidery on the back panel adds a quiet mark of craft.
          - paragraph [ref=e223]: 300–350 GSM fabric · Warm ivory · Lotus embroidery
        - generic [ref=e228]:
          - text: "06"
          - heading "Stable Foundation" [level=3] [ref=e229]
          - paragraph [ref=e230]: The cork base and cushion system work together to minimise micro-movements during sitting. Stability is not just comfort — it is the physical prerequisite for accessing deeper meditative states without constant readjustment.
          - paragraph [ref=e231]: Cork composite · 500 × 440 mm footprint
