        - heading "Ergonomics meets the ancient art of seated meditation." [level=2] [ref=e94]
        - paragraph [ref=e95]: "The Lotus Seat combines two innovations that work in harmony: an 8° inclined cork base that gently tilts the pelvis forward into its natural position, and a high-resilience natural latex cushion that supports your weight without allowing excessive sinking."
        - paragraph [ref=e96]: Together, they create the conditions for an upright, stable, comfortable posture — the foundation every meditation tradition points toward, and the thing most cushions fail to deliver.
